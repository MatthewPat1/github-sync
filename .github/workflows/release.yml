name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match manifest.json version $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ASSETS=(
            "dist/github-sync/manifest.json"
            "dist/github-sync/main.js"
            "dist/github-sync.zip"
          )
          if [ -f "dist/github-sync/styles.css" ]; then
            ASSETS+=("dist/github-sync/styles.css")
          fi

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "$TAG" \
            --notes "Release $TAG"
